<!DOCTYPE html>
<html>
<head>
    <title>Exercise 3 Bonus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Forest Image Effects</h1>
    </header>

    <main class="image-grid">
        <div class="img-card" id="A">
            <img src="first forest.jpg" alt="Forest 1">
            <p>div#A</p>
        </div>

        <div class="img-card" id="B">
            <img src="forest heart.jpg" alt="Forest 2">
            <p>div#B</p>
        </div>

        <div class="img-card" id="C">
            <img src="frog leaf.jpg" alt="Forest 3">
            <p>div#C</p>
        </div>

        <div class="img-card" id="D">
            <img src="dark forest.jpg" alt="Forest 4">
            <p class="text-as-shadow">div#D</p>
        </div>
    </main>

    <footer>
        <p>Nathaniel April 2026</p>
    </footer>

</body>
</html>
