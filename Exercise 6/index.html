<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 6 - Petrol Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calc-container">
        <h2>Petrol Cost Calculator</h2>
        
        <div class="input-group">
            <label for="price">Cost per Liter (£):</label>
            <input type="number" id="price" value="1.72" step="0.01" min="0">
        </div>

        <div class="input-group">
            <label for="liters">Liters Purchased:</label>
            <input type="number" id="liters" value="0" step="0.1" min="0">
        </div>

        <button id="calc-btn">Calculate Total</button>

        <div class="result-area">
            <p id="total-display">Total Cost: £0.00</p>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
